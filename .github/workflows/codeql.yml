name: CodeQL Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        # Soft-fail: G13_Linux is currently private without GitHub Advanced Security,
        # so result upload returns "Code scanning not enabled". The scan still runs.
        # Remove continue-on-error if the repo goes public OR Advanced Security is enabled.
        continue-on-error: true
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

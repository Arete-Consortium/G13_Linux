name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          # Upgrade pip first to clear CVE-2026-3219 (vulnerable in 26.0.1, fixed in 26.1).
          # Without this, pip-audit reports a vuln in its own toolchain on every run.
          python -m pip install --upgrade "pip>=26.1"
          pip install -e ".[dev]"
          pip install pip-audit
      - name: Run pip-audit
        # --skip-editable avoids "Dependency not found on PyPI" errors against
        # the local editable install of g13-linux itself.
        run: pip-audit --skip-editable
